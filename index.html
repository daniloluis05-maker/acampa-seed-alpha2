<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Missão Level-Up — Acampa Seed 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
/* PALETA ACAMPA SEED 2026 */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0a2e;color:#d0d8ff;font-family:'Rajdhani',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0d0a2e}::-webkit-scrollbar-thumb{background:#00e5ff;border-radius:2px}
@keyframes flicker{0%,100%{opacity:1}92%{opacity:1}93%{opacity:.8}94%{opacity:1}96%{opacity:.9}97%{opacity:1}}
@keyframes scanline{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes gridmove{0%{background-position:0 0}100%{background-position:60px 60px}}
.app{min-height:100vh;background:radial-gradient(ellipse at 15% 0%,#2a0a5e 0%,transparent 55%),radial-gradient(ellipse at 85% 100%,#0a1a4e 0%,transparent 55%),radial-gradient(ellipse at 50% 50%,#1a0a3e 0%,transparent 80%),#0d0a2e}
.app::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.04) 1px,transparent 1px);background-size:60px 60px;animation:gridmove 8s linear infinite;pointer-events:none;z-index:0}
.scanline{position:fixed;top:0;left:0;width:100%;height:3px;background:linear-gradient(transparent,#00e5ff33,transparent);animation:scanline 5s linear infinite;pointer-events:none;z-index:9999}
.panel{background:rgba(19,16,58,.92);border:1px solid rgba(0,229,255,.25);backdrop-filter:blur(14px);position:relative;z-index:1}
.panel-cyan{border-color:#00e5ff44;box-shadow:0 0 24px #00e5ff0d,inset 0 0 24px rgba(0,229,255,.03)}
.btn{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border:none;cursor:pointer;padding:12px 24px;transition:all .2s;position:relative;overflow:hidden;z-index:1}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.btn-cyan{background:linear-gradient(135deg,#00bcd4,#0077aa);color:#fff}
.btn-cyan:hover{box-shadow:0 0 28px #00e5ff88;transform:translateY(-1px)}
.btn-yellow{background:linear-gradient(135deg,#ffd700,#cc8800);color:#000}
.btn-yellow:hover{box-shadow:0 0 28px #ffd70088;transform:translateY(-1px)}
.btn-green{background:linear-gradient(135deg,#39ff14,#1a8800);color:#000}
.btn-green:hover{box-shadow:0 0 28px #39ff1488}
.btn-red{background:linear-gradient(135deg,#ff2255,#990022);color:#fff}
.btn-red:hover{box-shadow:0 0 28px #ff225588}
.btn-ghost{background:transparent;border:1px solid rgba(0,229,255,.25);color:#d0d8ff}
.btn-ghost:hover{border-color:#00e5ff88;color:#00e5ff}
.input{width:100%;background:rgba(0,229,255,.04);border:1px solid rgba(0,229,255,.2);color:#d0d8ff;font-family:'Rajdhani',sans-serif;font-size:16px;padding:12px 16px;outline:none;transition:.2s}
.input:focus{border-color:#00e5ff88;box-shadow:0 0 14px #00e5ff1a}
.input::placeholder{color:#6a6a9a}
.select{width:100%;background:#0d0a2e;border:1px solid rgba(0,229,255,.2);color:#d0d8ff;font-family:'Rajdhani',sans-serif;font-size:16px;padding:12px 16px;outline:none;transition:.2s;cursor:pointer}
.select:focus{border-color:#00e5ff88}
.label{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;color:#6a6a9a;text-transform:uppercase;display:block;margin-bottom:6px}
.tag{display:inline-block;font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1px;padding:3px 8px;border:1px solid;text-transform:uppercase}
.mission-card{animation:fadeIn .4s ease forwards;transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;position:relative;z-index:1;cursor:default;}
.mission-card:hover{transform:translateY(-6px) scale(1.01);z-index:10;}

.progress-bar{height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .6s ease}
.nav{display:flex;gap:4px;border-bottom:1px solid rgba(0,229,255,.2);margin-bottom:24px;flex-wrap:wrap}
.nav-btn{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:1px;padding:10px 14px;background:transparent;border:none;color:#6a6a9a;cursor:pointer;border-bottom:2px solid transparent;transition:.2s;text-transform:uppercase;white-space:nowrap}
.nav-btn.active{color:#00e5ff;border-bottom-color:#00e5ff}
.nav-btn.active-yellow{color:#ffd700;border-bottom-color:#ffd700}
.nav-btn:hover{color:#d0d8ff}
.badge-pending{background:#ffd70022;color:#ffd700;border-color:#ffd70044}
.badge-approved{background:#39ff1422;color:#39ff14;border-color:#39ff1444}
.badge-rejected{background:#ff225522;color:#ff2255;border-color:#ff225544}
.error-msg{background:#ff225511;border:1px solid #ff225544;color:#ff2255;padding:10px 14px;font-size:13px}
.success-msg{background:#39ff1411;border:1px solid #39ff1444;color:#39ff14;padding:10px 14px;font-size:13px}
.spinner{width:20px;height:20px;border:2px solid rgba(0,229,255,.2);border-top-color:#00e5ff;border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.diff-btn{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1px;padding:9px 10px;border:1px solid;background:transparent;cursor:pointer;transition:all .2s;text-transform:uppercase;flex:1;min-width:80px}
@media(max-width:600px){.grid-2{grid-template-columns:1fr}.hide-mobile{display:none!important}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const INITIAL_MISSIONS = [
  { id: 1, title: "Primeiro Contato", desc: "Apresente-se para 3 pessoas que você nunca conversou no acampamento.", tip: "Procure alguém que esteja sozinho ou em um grupo pequeno. Um simples 'oi, meu nome é...' já é o suficiente para começar!", points: 100, category: "Social", difficulty: "FÁCIL" },
  { id: 2, title: "Devocional Matinal", desc: "Acorde antes das 7h e faça um devocional de 15 minutos. Tire uma foto do lugar onde você fez.", tip: "Escolha um versículo que te marcou e anote o que Deus falou com você. A foto pode ser do lugar, da sua bíblia aberta ou das suas anotações.", points: 150, category: "Espiritual", difficulty: "MÉDIO" },
  { id: 3, title: "Servo Oculto", desc: "Faça algo de bom para alguém sem que essa pessoa saiba que foi você.", tip: "Pode ser arrumar a cama de alguém, deixar um bilhete de encorajamento, pegar o lanche para a pessoa ou qualquer gesto de amor anônimo.", points: 200, category: "Serviço", difficulty: "MÉDIO" },
  { id: 4, title: "Versículo Decorado", desc: "Decore Filipenses 4:13 e recite para um líder que irá validar.", tip: '"Tudo posso naquele que me fortalece." — Repita em voz alta várias vezes, divida em partes menores e associe cada parte a um gesto para memorizar mais fácil!', points: 120, category: "Espiritual", difficulty: "FÁCIL" },
  { id: 5, title: "Fotógrafo Missionário", desc: "Registre 5 momentos marcantes do acampamento em fotos.", tip: "Pense em momentos de alegria, conexão, oração, natureza e superação. Cada foto deve contar uma história diferente do acampamento.", points: 180, category: "Criativo", difficulty: "FÁCIL" },
  { id: 6, title: "Oração em Grupo", desc: "Organize e lidere um momento de oração com pelo menos 4 pessoas.", tip: "Você pode convidar pessoas após o jantar ou antes de dormir. Proponha um tema de oração, ore primeiro para dar o exemplo e deixe os outros à vontade para participar.", points: 250, category: "Liderança", difficulty: "DIFÍCIL" },
  { id: 7, title: "Carta de Gratidão", desc: "Escreva uma carta de gratidão para alguém especial e entregue pessoalmente.", tip: "Seja específico! Mencione algo que essa pessoa fez que te impactou de verdade. Cartas manuscritas têm muito mais valor do que mensagens digitais.", points: 200, category: "Social", difficulty: "MÉDIO" },
  { id: 8, title: "Desafio da Madrugada", desc: "Fique acordado até meia-noite em uma vigília de oração.", tip: "Combine com um grupo para fazerem juntos. Use o tempo para orar, louvar e interceder pelos outros participantes do acampamento. Tire uma foto do grupo como comprovante!", points: 300, category: "Espiritual", difficulty: "DIFÍCIL" },
];

const CATEGORIES = ["Social","Espiritual","Serviço","Criativo","Liderança"];
const CATEGORY_COLORS = { Social:"#00e5ff", Espiritual:"#9b30ff", Serviço:"#39ff14", Criativo:"#ff4dbb", Liderança:"#ffd700" };

const DIFFICULTIES = [
  { label:"FÁCIL",         color:"#39ff14", pts:100 },
  { label:"MÉDIO",         color:"#ffd700", pts:200 },
  { label:"DIFÍCIL",       color:"#ff6600", pts:300 },
  { label:"MUITO DIFÍCIL", color:"#ff2255", pts:450 },
  { label:"ATALAIA",       color:"#bf00ff", pts:600 },
];
const DIFFICULTY_COLORS = Object.fromEntries(DIFFICULTIES.map(d => [d.label, d.color]));

function getLevelInfo(points) {
  const levels = [
    { name:"RECRUTA",  min:0,    max:299,      icon:"◈" },
    { name:"INICIADO", min:300,  max:699,      icon:"◆" },
    { name:"GUERREIRO",min:700,  max:1199,     icon:"⬡" },
    { name:"ELITE",    min:1200, max:1999,     icon:"★" },
    { name:"LENDÁRIO", min:2000, max:Infinity, icon:"⚡" },
  ];
  return levels.find(l => points >= l.min && points <= l.max) || levels[0];
}

// ── Store ─────────────────────────────────────────────────────────────────────
let store = {
  users: [{ id:"admin", name:"Admin", email:"admin@church.com", password:"admin123", role:"admin", points:0, completedMissions:[] }],
  submissions: [],
  missions: INITIAL_MISSIONS,
};
let storeListeners = [];
const subscribe = fn => { storeListeners.push(fn); return () => { storeListeners = storeListeners.filter(l => l !== fn); }; };
const notify = () => storeListeners.forEach(fn => fn({...store}));
const getStore = () => ({...store});

function registerUser(name, email, password) {
  if (store.users.find(u => u.email === email)) return { error:"Email já cadastrado." };
  const user = { id: Date.now().toString(), name, email, password, role:"user", points:0, completedMissions:[] };
  store.users = [...store.users, user]; notify(); return { user };
}
function loginUser(email, password) {
  const user = store.users.find(u => u.email === email && u.password === password);
  if (!user) return { error:"Email ou senha inválidos." };
  return { user };
}
function submitMission(userId, missionId, imageBase64) {
  const already = store.submissions.find(s => s.userId === userId && s.missionId === missionId && s.status !== "rejected");
  if (already) return { error:"Você já enviou comprovante para essa missão." };
  const sub = { id: Date.now().toString(), userId, missionId, imageBase64, status:"pending", createdAt: new Date().toISOString() };
  store.submissions = [...store.submissions, sub]; notify(); return { submission: sub };
}
function reviewSubmission(submissionId, status) {
  store.submissions = store.submissions.map(s => {
    if (s.id !== submissionId) return s;
    if (status === "approved") {
      const mission = store.missions.find(m => m.id === s.missionId);
      store.users = store.users.map(u => {
        if (u.id !== s.userId) return u;
        return { ...u, points: u.points + (mission?.points || 0), completedMissions: [...u.completedMissions, s.missionId] };
      });
    }
    return { ...s, status };
  });
  notify();
}
function createMission(title, desc, tip, category, difficulty, points) {
  const mission = { id: Date.now(), title, desc, tip, category, difficulty, points: Number(points) };
  store.missions = [...store.missions, mission]; notify(); return { mission };
}
function updateMission(id, title, desc, tip, category, difficulty, points) {
  store.missions = store.missions.map(m =>
    m.id === id ? { ...m, title, desc, tip, category, difficulty, points: Number(points) } : m
  );
  notify();
}
function deleteMission(id) {
  store.missions = store.missions.filter(m => m.id !== id); notify();
}

// ── Logo ──────────────────────────────────────────────────────────────────────
function Logo({ size }) {
  const big = size === "lg";
  return (
    <div style={{textAlign:"center", animation:"flicker 8s infinite"}}>
      <div style={{fontFamily:"'Orbitron',monospace", fontSize:big?11:9, letterSpacing:4, color:"#ff4dbb", marginBottom:4}}>ACAMPA SEED 2026</div>
      <div style={{fontFamily:"'Orbitron',monospace", fontWeight:900, fontSize:big?42:22, lineHeight:1, background:"linear-gradient(135deg,#00e5ff,#00bcd4)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent"}}>MISSÃO</div>
      <div style={{fontFamily:"'Orbitron',monospace", fontWeight:900, fontSize:big?56:28, lineHeight:1, background:"linear-gradient(135deg,#ffd700,#ffaa00)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent"}}>LEVEL-UP</div>
    </div>
  );
}

// ── Level Bar ─────────────────────────────────────────────────────────────────
function LevelBar({ user }) {
  const lvl = getLevelInfo(user.points);
  const thresholds = [0,300,700,1200,2000];
  const next = thresholds.find(l => l > user.points) || 2000;
  const prev = [...thresholds].reverse().find(l => l <= user.points) || 0;
  const pct  = next === prev ? 100 : Math.min(100, ((user.points - prev) / (next - prev)) * 100);
  return (
    <div className="panel panel-cyan" style={{padding:"16px 20px", borderRadius:4}}>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8}}>
        <div>
          <span style={{fontFamily:"Orbitron", fontSize:10, color:"#6a6a9a"}}>NÍVEL ATUAL</span>
          <div style={{fontFamily:"Orbitron", fontWeight:900, fontSize:18, color:"#00e5ff"}}>{lvl.icon} {lvl.name}</div>
        </div>
        <div style={{textAlign:"right"}}>
          <span style={{fontFamily:"Orbitron", fontSize:10, color:"#6a6a9a"}}>PONTOS</span>
          <div style={{fontFamily:"Orbitron", fontWeight:900, fontSize:24, color:"#ffd700"}}>{user.points}</div>
        </div>
      </div>
      <div className="progress-bar">
        <div className="progress-fill" style={{width:`${pct}%`, background:"linear-gradient(90deg,#9b30ff,#00e5ff,#ffd700)"}} />
      </div>
      <div style={{fontSize:11, color:"#6a6a9a", marginTop:4, textAlign:"right"}}>{user.points} / {next === Infinity ? "MAX" : next} pts</div>
    </div>
  );
}

// ── Auth Screen ───────────────────────────────────────────────────────────────
function AuthScreen({ onLogin }) {
  const [tab, setTab] = useState("login");
  const [form, setForm] = useState({ name:"", email:"", password:"" });
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const set = k => e => setForm(f => ({...f, [k]: e.target.value}));

  const handleSubmit = () => {
    setError(""); setLoading(true);
    setTimeout(() => {
      setLoading(false);
      if (tab === "login") {
        const res = loginUser(form.email, form.password);
        if (res.error) setError(res.error); else onLogin(res.user);
      } else {
        if (!form.name.trim()) return setError("Informe seu nome.");
        if (!form.email.includes("@")) return setError("Email inválido.");
        if (form.password.length < 6) return setError("Senha mínima: 6 caracteres.");
        const res = registerUser(form.name, form.email, form.password);
        if (res.error) setError(res.error); else onLogin(res.user);
      }
    }, 600);
  };

  return (
    <div style={{minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", padding:20}}>
      <div style={{width:"100%", maxWidth:420}}>
        <div style={{marginBottom:40}}><Logo size="lg" /></div>
        <p style={{textAlign:"center", color:"#9090bb", marginBottom:32, fontSize:15, lineHeight:1.8, fontStyle:"italic"}}>
          "Prossigo para o alvo, para o prêmio da soberana vocação de Deus em Cristo Jesus."
          <br/><span style={{fontSize:12, opacity:.7, fontStyle:"normal", fontFamily:"Orbitron", letterSpacing:1, color:"#ff4dbb"}}>Filipenses 3:14</span>
        </p>
        <div className="panel panel-cyan" style={{padding:32, borderRadius:4}}>
          <div style={{display:"flex", marginBottom:28, borderBottom:"1px solid rgba(0,229,255,.2)"}}>
            {["login","register"].map(t => (
              <button key={t} className={`nav-btn ${tab===t?"active":""}`} onClick={() => {setTab(t); setError("");}}>
                {t==="login" ? "▶ Entrar" : "+ Cadastrar"}
              </button>
            ))}
          </div>
          <div style={{display:"flex", flexDirection:"column", gap:16}}>
            {tab==="register" && (
              <div><label className="label">Nome completo</label>
              <input className="input" placeholder="Seu nome..." value={form.name} onChange={set("name")} /></div>
            )}
            <div><label className="label">Email</label>
            <input className="input" type="email" placeholder="seu@email.com" value={form.email} onChange={set("email")} onKeyDown={e => e.key==="Enter" && handleSubmit()} /></div>
            <div><label className="label">Senha {tab==="register" && "(mín. 6 caracteres)"}</label>
            <input className="input" type="password" placeholder="••••••••" value={form.password} onChange={set("password")} onKeyDown={e => e.key==="Enter" && handleSubmit()} /></div>
            {error && <div className="error-msg">{error}</div>}
            <button className="btn btn-cyan" style={{width:"100%", marginTop:8}} onClick={handleSubmit} disabled={loading}>
              {loading ? <span className="spinner"/> : tab==="login" ? "▶ INICIAR JORNADA" : "+ CRIAR CONTA"}
            </button>
          </div>
        </div>
        <p style={{textAlign:"center", marginTop:16, fontSize:12, color:"#6a6a9a"}}>
          {tab==="login" ? "Novo por aqui? " : "Já tem conta? "}
          <button onClick={() => {setTab(tab==="login"?"register":"login"); setError("");}}
            style={{background:"none", border:"none", color:"#00e5ff", cursor:"pointer", fontFamily:"Orbitron", fontSize:11}}>
            {tab==="login" ? "CADASTRAR-SE" : "ENTRAR"}
          </button>
        </p>
      </div>
    </div>
  );
}

// ── Mission Card ──────────────────────────────────────────────────────────────
function MissionCard({ mission, user, onSubmit, isAdmin, onDelete }) {
  const [expanded,    setExpanded]    = useState(false);
  const [editing,     setEditing]     = useState(false);
  const [imageBase64, setImageBase64] = useState(null);
  const [previewUrl,  setPreviewUrl]  = useState(null);
  const [msg,         setMsg]         = useState("");
  const [sending,     setSending]     = useState(false);
  const [hovered,     setHovered]     = useState(false);
  const fileRef = useRef();

  // edit form state — pre-filled with current mission values
  const [editForm, setEditForm] = useState({
    title: mission.title, desc: mission.desc, tip: mission.tip || "",
    category: mission.category, difficulty: mission.difficulty, points: String(mission.points)
  });
  const [editMsg, setEditMsg] = useState("");
  const setE = k => e => setEditForm(f => ({...f, [k]: e.target.value}));

  const submission  = store.submissions.filter(s => s.userId === user.id && s.missionId === mission.id)
    .sort((a,b) => new Date(b.createdAt)-new Date(a.createdAt))[0];
  const isCompleted = user.completedMissions.includes(mission.id);
  const isPending   = submission?.status === "pending";
  const isRejected  = submission?.status === "rejected";
  const catColor    = CATEGORY_COLORS[mission.category] || "#00e5ff";
  const diffColor   = DIFFICULTY_COLORS[mission.difficulty] || "#6a6a9a";
  const hoverBorder = catColor;
  const baseBorder  = isCompleted ? "#39ff1444" : isPending ? "#ffd70044" : "rgba(0,229,255,.25)";

  const handleFile = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => { setImageBase64(ev.target.result); setPreviewUrl(ev.target.result); };
    reader.readAsDataURL(file);
  };

  const handleSubmit = () => {
    if (!imageBase64) return setMsg("Selecione uma foto como comprovante.");
    setSending(true);
    setTimeout(() => {
      const res = submitMission(user.id, mission.id, imageBase64);
      setSending(false);
      if (res.error) setMsg(res.error);
      else { setMsg("✓ Enviado! Aguarde aprovação do líder."); setExpanded(false); onSubmit(); }
    }, 600);
  };

  const handleSaveEdit = () => {
    if (!editForm.title.trim()) return setEditMsg("Informe o título.");
    if (!editForm.desc.trim())  return setEditMsg("Informe a descrição.");
    if (!editForm.points || isNaN(editForm.points) || Number(editForm.points) <= 0) return setEditMsg("Pontuação inválida.");
    updateMission(mission.id, editForm.title.trim(), editForm.desc.trim(), editForm.tip.trim(),
      editForm.category, editForm.difficulty, editForm.points);
    setEditMsg("✓ Missão atualizada!");
    setTimeout(() => { setEditMsg(""); setEditing(false); }, 1200);
  };

  const statusBadge = () => {
    if (isCompleted) return <span className="tag badge-approved">✓ CONCLUÍDA +{mission.points}pts</span>;
    if (isPending)   return <span className="tag badge-pending">⏳ AGUARDANDO VALIDAÇÃO</span>;
    if (isRejected)  return <span className="tag badge-rejected">✗ REPROVADA — TENTE NOVAMENTE</span>;
    return null;
  };

  const selDiff = DIFFICULTIES.find(d => d.label === editForm.difficulty);

  return (
    <div className="mission-card panel"
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        padding:20, borderRadius:4,
        borderColor: hovered ? hoverBorder : baseBorder,
        boxShadow:   hovered ? `0 8px 32px ${hoverBorder}44, 0 0 0 1px ${hoverBorder}66` : "none",
        opacity: isCompleted ? .8 : 1,
        background: hovered ? "linear-gradient(135deg,rgba(19,16,58,.98),rgba(19,16,58,.92))" : "rgba(19,16,58,.92)",
      }}>

      {/* Header: tags + pontos + botões admin */}
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:8}}>
        <div style={{display:"flex", gap:8, flexWrap:"wrap"}}>
          <span className="tag" style={{borderColor:catColor, color:catColor}}>{mission.category}</span>
          <span className="tag" style={{borderColor:diffColor, color:diffColor}}>{mission.difficulty}</span>
        </div>
        <div style={{display:"flex", alignItems:"center", gap:8}}>
          <span style={{fontFamily:"Orbitron", fontSize:16, fontWeight:900, color:"#ffd700"}}>+{mission.points}</span>
          {isAdmin && (
            <>
              <button onClick={() => { setEditing(!editing); setEditMsg(""); }}
                style={{background: editing ? "rgba(0,229,255,.15)" : "none",
                  border:"1px solid rgba(0,229,255,.4)", color:"#00e5ff", cursor:"pointer",
                  fontFamily:"Orbitron", fontSize:9, padding:"4px 8px", borderRadius:2, transition:"all .2s"}}
                title="Editar missão">✎ EDITAR</button>
              {onDelete && (
                <button onClick={() => onDelete(mission.id)}
                  style={{background:"none", border:"1px solid #ff225544", color:"#ff2255", cursor:"pointer",
                    fontFamily:"Orbitron", fontSize:9, padding:"4px 8px", borderRadius:2, transition:"all .2s"}}
                  title="Excluir missão">✕</button>
              )}
            </>
          )}
        </div>
      </div>

      {/* Conteúdo normal da missão (oculto ao editar) */}
      {!editing && (
        <>
          <h3 style={{fontFamily:"Orbitron", fontSize:14, fontWeight:700, marginBottom:8, color:"#e0e0ff"}}>{mission.title}</h3>
          <p style={{fontSize:14, color:"#6a6a9a", lineHeight:1.5, marginBottom:12}}>{mission.desc}</p>
          {mission.tip && (
            <div style={{margin:"0 0 14px 0", padding:"12px 16px",
              background:"linear-gradient(135deg,rgba(255,215,0,.07),rgba(191,0,255,.07))",
              border:"1px solid rgba(255,215,0,.3)", borderLeft:"3px solid #ffd700", borderRadius:"0 4px 4px 0"}}>
              <div style={{fontFamily:"Orbitron", fontSize:9, letterSpacing:2, color:"#ffd700", marginBottom:5}}>💡 DICA / SUGESTÃO</div>
              <p style={{fontSize:13, color:"#e8d88a", lineHeight:1.6, fontStyle:"italic"}}>{mission.tip}</p>
            </div>
          )}
          {statusBadge() && <div style={{marginBottom:12}}>{statusBadge()}</div>}
          {!isAdmin && !isCompleted && !isPending && (
            <button className="btn btn-ghost" style={{fontSize:10, padding:"8px 16px"}} onClick={() => setExpanded(!expanded)}>
              {expanded ? "▲ FECHAR" : isRejected ? "↻ REENVIAR COMPROVANTE" : "▶ ENVIAR COMPROVANTE"}
            </button>
          )}
          {!isAdmin && expanded && !isCompleted && !isPending && (
            <div style={{marginTop:16, paddingTop:16, borderTop:"1px solid rgba(0,229,255,.2)", display:"flex", flexDirection:"column", gap:12}}>
              <p style={{fontSize:12, color:"#6a6a9a"}}>Tire uma foto como prova de que cumpriu a missão. Um líder irá verificar e aprovar.</p>
              <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleFile} />
              <button className="btn btn-ghost" style={{fontSize:10}} onClick={() => fileRef.current.click()}>
                📷 {imageBase64 ? "TROCAR FOTO" : "SELECIONAR FOTO"}
              </button>
              {previewUrl && <img src={previewUrl} alt="preview" style={{width:"100%", maxHeight:180, objectFit:"cover", border:"1px solid rgba(0,229,255,.2)", borderRadius:2}} />}
              {msg && <div className={msg.startsWith("✓") ? "success-msg" : "error-msg"}>{msg}</div>}
              <button className="btn btn-cyan" onClick={handleSubmit} disabled={sending || !imageBase64}>
                {sending ? <span className="spinner"/> : "↑ ENVIAR PARA VALIDAÇÃO"}
              </button>
            </div>
          )}
        </>
      )}

      {/* Formulário de edição inline */}
      {editing && isAdmin && (
        <div style={{marginTop:8, display:"flex", flexDirection:"column", gap:14,
          paddingTop:16, borderTop:"1px solid rgba(0,229,255,.2)", animation:"fadeIn .2s ease"}}>

          <div style={{fontFamily:"Orbitron", fontSize:10, color:"#00e5ff", letterSpacing:2}}>✎ EDITANDO MISSÃO</div>

          <div>
            <label className="label">Título</label>
            <input className="input" value={editForm.title} onChange={setE("title")} />
          </div>

          <div>
            <label className="label">Descrição</label>
            <textarea className="input" value={editForm.desc} onChange={setE("desc")} rows={3}
              style={{resize:"vertical", fontFamily:"'Rajdhani',sans-serif", lineHeight:1.5}} />
          </div>

          <div>
            <label className="label" style={{color:"#ffd700"}}>💡 Dica / Sugestão <span style={{color:"#6a6a9a", fontWeight:400}}>(opcional)</span></label>
            <textarea className="input" value={editForm.tip} onChange={setE("tip")} rows={2}
              placeholder="Dica para os participantes..."
              style={{resize:"vertical", fontFamily:"'Rajdhani',sans-serif", lineHeight:1.5,
                borderColor:"rgba(255,215,0,.3)", background:"linear-gradient(135deg,rgba(255,215,0,.05),rgba(191,0,255,.04))"}} />
          </div>

          <div className="grid-2">
            <div>
              <label className="label">Categoria</label>
              <select className="select" value={editForm.category} onChange={setE("category")}>
                {CATEGORIES.map(c => <option key={c} value={c} style={{background:"#0d0a2e"}}>{c}</option>)}
              </select>
            </div>
            <div>
              <label className="label">Pontuação</label>
              <input className="input" type="number" min="1" value={editForm.points} onChange={setE("points")} />
            </div>
          </div>

          <div>
            <label className="label">Dificuldade</label>
            <div style={{display:"flex", gap:6, flexWrap:"wrap", marginTop:4}}>
              {DIFFICULTIES.map(d => (
                <button key={d.label} className="diff-btn"
                  style={{
                    borderColor: d.color,
                    color:       editForm.difficulty === d.label ? "#000" : d.color,
                    background:  editForm.difficulty === d.label ? d.color : "transparent",
                    fontWeight:  editForm.difficulty === d.label ? "700" : "400",
                    fontSize:    d.label.length > 8 ? "8px" : "9px",
                  }}
                  onClick={() => setEditForm(f => ({...f, difficulty: d.label}))}>
                  {d.label}
                </button>
              ))}
            </div>
          </div>

          {editMsg && <div className={editMsg.startsWith("✓") ? "success-msg" : "error-msg"}>{editMsg}</div>}

          <div style={{display:"flex", gap:8}}>
            <button className="btn btn-cyan" style={{flex:1, fontSize:11}} onClick={handleSaveEdit}>✓ SALVAR</button>
            <button className="btn btn-ghost" style={{flex:1, fontSize:11}} onClick={() => { setEditing(false); setEditMsg(""); }}>✕ CANCELAR</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Create Mission Form ───────────────────────────────────────────────────────
function CreateMissionForm({ onCreated }) {
  const EMPTY = { title:"", desc:"", tip:"", category:"Social", difficulty:"FÁCIL", points:"" };
  const [form, setForm] = useState(EMPTY);
  const [msg, setMsg]   = useState("");
  const set = k => e => setForm(f => ({...f, [k]: e.target.value}));
  const selDiff = DIFFICULTIES.find(d => d.label === form.difficulty);

  const handleCreate = () => {
    if (!form.title.trim()) return setMsg("Informe o título da missão.");
    if (!form.desc.trim())  return setMsg("Informe a descrição.");
    if (!form.points || isNaN(form.points) || Number(form.points) <= 0) return setMsg("Informe uma pontuação válida.");
    createMission(form.title.trim(), form.desc.trim(), form.tip.trim(), form.category, form.difficulty, form.points);
    setForm(EMPTY);
    setMsg("✓ Missão criada com sucesso!");
    setTimeout(() => { setMsg(""); onCreated && onCreated(); }, 1500);
  };

  return (
    <div className="panel panel-cyan" style={{padding:28, borderRadius:4}}>
      <div style={{fontFamily:"Orbitron", fontSize:13, fontWeight:700, color:"#ffd700", marginBottom:24, letterSpacing:2}}>
        ⬡ CADASTRAR NOVA MISSÃO
      </div>
      <div style={{display:"flex", flexDirection:"column", gap:18}}>

        <div>
          <label className="label">Título da missão</label>
          <input className="input" placeholder="Ex: Vigília Secreta..." value={form.title} onChange={set("title")} />
        </div>

        <div>
          <label className="label">Descrição / O que o jovem deve fazer</label>
          <textarea className="input" placeholder="Descreva claramente o objetivo da missão..."
            value={form.desc} onChange={set("desc")} rows={3}
            style={{resize:"vertical", fontFamily:"'Rajdhani',sans-serif", lineHeight:1.5}} />
        </div>

        <div>
          <label className="label" style={{color:"#ffd700"}}>💡 Dica / Sugestão <span style={{fontWeight:400, color:"#6a6a9a"}}>(opcional)</span></label>
          <textarea className="input" placeholder="Ex: Você pode fazer isso logo após o culto, peça ajuda a um amigo..."
            value={form.tip} onChange={set("tip")} rows={3}
            style={{
              resize:"vertical",
              fontFamily:"'Rajdhani',sans-serif",
              lineHeight:1.5,
              borderColor:"rgba(255,215,0,.3)",
              background:"linear-gradient(135deg, rgba(255,215,0,.05), rgba(191,0,255,.04))",
            }} />
          <div style={{fontSize:11, color:"#ffd70088", marginTop:4, fontStyle:"italic"}}>
            Esta dica aparecerá destacada na missão para orientar os participantes.
          </div>
        </div>

        <div className="grid-2">
          <div>
            <label className="label">Categoria</label>
            <select className="select" value={form.category} onChange={set("category")}>
              {CATEGORIES.map(c => <option key={c} value={c} style={{background:"#0d0a2e"}}>{c}</option>)}
            </select>
          </div>
          <div>
            <label className="label">Pontuação</label>
            <input className="input" type="number" min="1"
              placeholder={selDiff ? `Sugerido: ${selDiff.pts}` : "Ex: 200"}
              value={form.points} onChange={set("points")} />
          </div>
        </div>

        <div>
          <label className="label">Nível de dificuldade</label>
          <div style={{display:"flex", gap:6, flexWrap:"wrap", marginTop:4}}>
            {DIFFICULTIES.map(d => (
              <button key={d.label}
                className="diff-btn"
                style={{
                  borderColor: d.color,
                  color:       form.difficulty === d.label ? "#000" : d.color,
                  background:  form.difficulty === d.label ? d.color : "transparent",
                  fontWeight:  form.difficulty === d.label ? "700" : "400",
                  fontSize:    d.label.length > 8 ? "8px" : "9px",
                }}
                onClick={() => setForm(f => ({...f, difficulty: d.label, points: f.points || String(d.pts)}))}>
                {d.label}
              </button>
            ))}
          </div>
          {selDiff && (
            <div style={{marginTop:8, fontSize:11, color: selDiff.color, fontFamily:"Orbitron", letterSpacing:1}}>
              ◈ Pontuação sugerida para este nível: {selDiff.pts} pts
            </div>
          )}
        </div>

        {msg && <div className={msg.startsWith("✓") ? "success-msg" : "error-msg"}>{msg}</div>}

        <button className="btn btn-yellow" style={{width:"100%", fontSize:13}} onClick={handleCreate}>
          + CRIAR MISSÃO
        </button>
      </div>
    </div>
  );
}

// ── User Dashboard ────────────────────────────────────────────────────────────
function UserDashboard({ user, onUpdate }) {
  const [tab, setTab] = useState("missions");
  const [storeData, setStoreData] = useState(getStore());
  useEffect(() => subscribe(s => setStoreData(s)), []);
  const currentUser   = storeData.users.find(u => u.id === user.id) || user;
  const mySubmissions = storeData.submissions.filter(s => s.userId === user.id);

  return (
    <div>
      <div style={{marginBottom:24}}><LevelBar user={currentUser} /></div>
      <div className="nav">
        {[["missions","⬡ MISSÕES"],["history","◈ MEU HISTÓRICO"]].map(([k,l]) => (
          <button key={k} className={`nav-btn ${tab===k?"active":""}`} onClick={() => setTab(k)}>{l}</button>
        ))}
      </div>
      {tab==="missions" && (
        <div style={{display:"flex", flexDirection:"column", gap:16}}>
          {storeData.missions.map((m,i) => (
            <div key={m.id} style={{animationDelay:`${i*.05}s`}}>
              <MissionCard mission={m} user={currentUser} onSubmit={onUpdate} isAdmin={false} />
            </div>
          ))}
        </div>
      )}
      {tab==="history" && (
        <div style={{display:"flex", flexDirection:"column", gap:12}}>
          {mySubmissions.length===0 && (
            <div style={{textAlign:"center", color:"#6a6a9a", padding:40}}>
              <div style={{fontFamily:"Orbitron", fontSize:24, marginBottom:8}}>◈</div>
              Nenhum comprovante enviado ainda.
            </div>
          )}
          {mySubmissions.map(sub => {
            const mission = storeData.missions.find(m => m.id === sub.missionId);
            return (
              <div key={sub.id} className="panel" style={{padding:16, borderRadius:4}}>
                <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:8}}>
                  <div>
                    <div style={{fontFamily:"Orbitron", fontSize:13, marginBottom:4}}>{mission?.title}</div>
                    <div style={{fontSize:12, color:"#6a6a9a"}}>{new Date(sub.createdAt).toLocaleString("pt-BR")}</div>
                  </div>
                  <span className={`tag ${sub.status==="approved"?"badge-approved":sub.status==="rejected"?"badge-rejected":"badge-pending"}`}>
                    {sub.status==="approved"?"✓ APROVADA":sub.status==="rejected"?"✗ REPROVADA":"⏳ PENDENTE"}
                  </span>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── Admin Dashboard ───────────────────────────────────────────────────────────
function AdminDashboard({ adminUser }) {
  const [tab, setTab]           = useState("validations");
  const [storeData, setStoreData] = useState(getStore());
  const [preview, setPreview]   = useState(null);
  useEffect(() => subscribe(s => setStoreData(s)), []);

  const subs = {
    pending:  storeData.submissions.filter(s => s.status==="pending"),
    approved: storeData.submissions.filter(s => s.status==="approved"),
    rejected: storeData.submissions.filter(s => s.status==="rejected"),
  };

  const SubCard = ({ sub }) => {
    const u = storeData.users.find(u => u.id === sub.userId);
    const m = storeData.missions.find(m => m.id === sub.missionId);
    return (
      <div className="panel" style={{padding:16, borderRadius:4, display:"flex", flexDirection:"column", gap:12}}>
        <div style={{display:"flex", justifyContent:"space-between", flexWrap:"wrap", gap:8}}>
          <div>
            <div style={{fontFamily:"Orbitron", fontSize:13, color:"#00e5ff"}}>{u?.name}</div>
            <div style={{fontSize:13, color:"#e0e0ff", marginTop:2}}>{m?.title}</div>
            <div style={{fontSize:11, color:"#6a6a9a", marginTop:2}}>+{m?.points} pts • {new Date(sub.createdAt).toLocaleString("pt-BR")}</div>
          </div>
          <span className={`tag ${sub.status==="approved"?"badge-approved":sub.status==="rejected"?"badge-rejected":"badge-pending"}`}>
            {sub.status.toUpperCase()}
          </span>
        </div>
        {sub.imageBase64 && (
          <img src={sub.imageBase64} alt="comprovante"
            style={{width:"100%", maxHeight:160, objectFit:"cover", borderRadius:2,
              border:"1px solid rgba(0,229,255,.2)", cursor:"pointer"}}
            onClick={() => setPreview(sub.imageBase64)} />
        )}
        {sub.status==="pending" && (
          <div style={{display:"flex", gap:8}}>
            <button className="btn btn-green" style={{flex:1, fontSize:10}} onClick={() => reviewSubmission(sub.id,"approved")}>✓ APROVAR</button>
            <button className="btn btn-red"   style={{flex:1, fontSize:10}} onClick={() => reviewSubmission(sub.id,"rejected")}>✗ REPROVAR</button>
          </div>
        )}
      </div>
    );
  };

  return (
    <div>
      {/* Stats */}
      <div className="grid-2" style={{marginBottom:24}}>
        {[
          {label:"Participantes", value:storeData.users.filter(u=>u.role==="user").length, color:"#00e5ff"},
          {label:"Pendentes",     value:subs.pending.length,         color:"#ffd700"},
          {label:"Aprovadas",     value:subs.approved.length,        color:"#39ff14"},
          {label:"Missões",       value:storeData.missions.length,   color:"#ff4dbb"},
        ].map(s => (
          <div key={s.label} className="panel" style={{padding:16, borderRadius:4, textAlign:"center"}}>
            <div style={{fontFamily:"Orbitron", fontSize:28, fontWeight:900, color:s.color}}>{s.value}</div>
            <div style={{fontSize:11, color:"#6a6a9a", marginTop:4, fontFamily:"Orbitron", letterSpacing:1}}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Nav tabs */}
      <div className="nav">
        {[
          ["validations", `⏳ PENDENTES (${subs.pending.length})`],
          ["approved",    "✓ APROVADAS"],
          ["rejected",    "✗ REPROVADAS"],
          ["missions",    "⬡ MISSÕES"],
          ["new",         "+ NOVA MISSÃO"],
        ].map(([k,l]) => (
          <button key={k}
            className={`nav-btn ${tab===k ? (k==="new" ? "active-yellow" : "active") : ""}`}
            onClick={() => setTab(k)}>{l}
          </button>
        ))}
      </div>

      {/* Validações pendentes */}
      {tab==="validations" && (
        <div style={{display:"flex", flexDirection:"column", gap:12}}>
          {subs.pending.length===0 && <EmptyState label="nenhuma pendente" />}
          {subs.pending.map(sub => <SubCard key={sub.id} sub={sub} />)}
        </div>
      )}

      {/* Aprovadas */}
      {tab==="approved" && (
        <div style={{display:"flex", flexDirection:"column", gap:12}}>
          {subs.approved.length===0 && <EmptyState label="nenhuma aprovada" />}
          {subs.approved.map(sub => <SubCard key={sub.id} sub={sub} />)}
        </div>
      )}

      {/* Reprovadas */}
      {tab==="rejected" && (
        <div style={{display:"flex", flexDirection:"column", gap:12}}>
          {subs.rejected.length===0 && <EmptyState label="nenhuma reprovada" />}
          {subs.rejected.map(sub => <SubCard key={sub.id} sub={sub} />)}
        </div>
      )}

      {/* Gerenciar missões */}
      {tab==="missions" && (
        <div style={{display:"flex", flexDirection:"column", gap:12}}>
          {storeData.missions.length===0 && <EmptyState label="nenhuma missão cadastrada" />}
          {storeData.missions.map(m => (
            <MissionCard key={m.id} mission={m} user={adminUser} onSubmit={()=>{}} isAdmin={true}
              onDelete={id => deleteMission(id)} />
          ))}
        </div>
      )}

      {/* Nova missão */}
      {tab==="new" && (
        <CreateMissionForm onCreated={() => setTab("missions")} />
      )}

      {/* Preview modal */}
      {preview && (
        <div style={{position:"fixed", inset:0, background:"rgba(0,0,0,.92)", display:"flex",
          alignItems:"center", justifyContent:"center", zIndex:1000, padding:20}}
          onClick={() => setPreview(null)}>
          <img src={preview} alt="preview" style={{maxWidth:"100%", maxHeight:"90vh", objectFit:"contain"}} />
          <button style={{position:"absolute", top:20, right:20, background:"none",
            border:"1px solid rgba(0,229,255,.2)", color:"#d0d8ff", fontFamily:"Orbitron",
            padding:"8px 16px", cursor:"pointer", fontSize:12}}
            onClick={() => setPreview(null)}>✕ FECHAR</button>
        </div>
      )}
    </div>
  );
}

function EmptyState({ label }) {
  return (
    <div style={{textAlign:"center", color:"#6a6a9a", padding:40}}>
      <div style={{fontFamily:"Orbitron", fontSize:24, marginBottom:8}}>◈</div>
      {label}
    </div>
  );
}

// ── App Root ──────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null);
  const [tick, setTick] = useState(0);

  if (!user) return (
    <div className="app">
      <div className="scanline"/>
      <AuthScreen onLogin={setUser} />
    </div>
  );

  const currentUser = store.users.find(u => u.id === user.id) || user;
  const isAdmin = currentUser.role === "admin";

  return (
    <div className="app">
      <div className="scanline"/>
      <div style={{borderBottom:"1px solid rgba(0,229,255,.2)", background:"rgba(13,10,46,.97)",
        position:"sticky", top:0, zIndex:100, backdropFilter:"blur(14px)"}}>
        <div style={{maxWidth:860, margin:"0 auto", padding:"12px 20px", display:"flex",
          alignItems:"center", justifyContent:"space-between"}}>
          <Logo size="sm" />
          <div style={{display:"flex", alignItems:"center", gap:12}}>
            <div style={{textAlign:"right"}} className="hide-mobile">
              <div style={{fontFamily:"Orbitron", fontSize:11, color:"#00e5ff"}}>{currentUser.name}</div>
              <div style={{fontSize:11, color:"#ffd700"}}>{isAdmin ? "👑 ADMIN" : `${currentUser.points} PTS`}</div>
            </div>
            <button className="btn btn-ghost" style={{fontSize:10, padding:"8px 14px"}} onClick={() => setUser(null)}>SAIR</button>
          </div>
        </div>
      </div>

      <div style={{maxWidth:860, margin:"0 auto", padding:"24px 20px 60px"}}>
        {isAdmin
          ? <AdminDashboard adminUser={currentUser} />
          : <UserDashboard user={currentUser} onUpdate={() => setTick(t=>t+1)} />
        }
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
